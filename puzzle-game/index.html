<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Interactivo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- 1. GALERÍA DE IMÁGENES -->
    <div id="gallery-screen" class="modal" style="display: none;">
        <div class="modal-content gallery-content">
            <h2>🖼️ Elige Puzzle</h2>
            <div id="gallery-grid" class="gallery-grid">
                <!-- Se rellena con JS -->
            </div>
        </div>
    </div>

    <!-- 2. MENÚ DE DIFICULTAD -->
    <div id="start-screen" class="modal" style="display: none;">
        <div class="modal-content start-menu">
            <h2 style="margin-bottom: 25px;">Selecciona la dificultad</h2>
            <div class="difficulty-btns">
                <button onclick="startMainGame(7)"><span style="color: #00ff00;">●</span> Fácil (49 piezas)</button>
                <button onclick="startMainGame(10)"><span style="color: #ffb400;">●</span> Medio (100 piezas)</button>
                <button onclick="startMainGame(12)"><span style="color: #ff3333;">●</span> Difícil (144 piezas)</button>
            </div>
            <button onclick="goBackToGallery()" style="margin-top: 30px; background: transparent; color: #a0a0a0; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; font-size: 1rem;">Volver a la galería</button>
        </div>
    </div>

    <!-- 3. CONTENEDOR DEL JUEGO PRINCIPAL (Usado para la Puerta y el Juego) -->
    <div class="game-container" style="display: none;" id="main-game">
        
        <div id="game-hud" class="game-hud" style="display: none;">
            <button onclick="goBackToGalleryFromGame()" class="hud-btn" id="hud-volver">⬅ Volver</button>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="events-toggle-btn" class="hud-btn" onclick="toggleEvents()" title="Activar/Desactivar Eventos" style="background: rgba(233, 69, 96, 0.2); border-color: #e94560;">⚡ Eventos: ON</button>
                <div id="event-tracker" class="event-tracker" title="Eventos restantes"></div>
            </div>
            <button id="hint-btn" class="hud-btn" onclick="showReference()">👁️ Ver Guía</button>
        </div>

        <h1 id="game-title">Desbloquea la Puerta</h1>
        <p id="game-subtitle" class="subtitle">Monta las 4 piezas para acceder a la galería completa.</p>
        
        <div class="play-area" id="play-area">
            <div id="board" class="board"></div>
            <div id="pieces-container" class="pieces-container"></div>
            <button id="bg-toggle-btn" class="corner-btn hidden" onclick="toggleBoardBg()" title="Cambiar fondo">💡</button>
        </div>

        <!-- Modal de Referencia Visual (Guía) -->
        <div id="reference-modal" class="modal hidden" onclick="this.classList.add('hidden')">
            <div class="modal-content" style="padding: 15px; max-width: 440px; background: #16213e; cursor: pointer;">
                <p style="margin-top: 0; color: #a0a0a0; font-size: 0.9rem; margin-bottom: 10px;">Haz clic en cualquier parte para volver al puzzle</p>
                <div id="full-reference-image" class="full-reference-image"></div>
            </div>
        </div>

        <!-- Modal de Minijuegos -->
        <div id="minigame-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title">¡Alerta de Evento! 🚨</h2>
                <p id="modal-desc"></p>
                
                <div id="modal-gif-container" style="display: none; margin: 20px auto; width: 100%; max-width: 250px; border-radius: 8px; overflow: hidden;">
                    <div class="tenor-gif-embed" data-postid="14702122" data-share-method="host" data-aspect-ratio="1.2549" data-width="100%"><a href="https://tenor.com/view/noice-nice-good-job-click-gif-14702122">Noice Nice GIF</a>from <a href="https://tenor.com/search/noice-gifs">Noice GIFs</a></div>
                </div>

                <div id="minigame-area">
                    <div id="minigame-grid" class="minigame-grid hidden"></div>
                    <button id="minigame-btn">¡Empezar Reto!</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- TUTORIAL OVERLAY -->
    <div id="tutorial-overlay" class="tutorial-overlay hidden">
        <div class="tutorial-box">
            <h2 id="tut-title" style="margin-bottom: 15px; margin-top: 0; color: #e94560;">Tutorial</h2>
            <p id="tut-text" style="margin-bottom: 25px; line-height: 1.5; color: #ccc;"></p>
            <button id="tut-next-btn" class="hud-btn" style="margin: 0 auto; display: block;" onclick="showTutorialStep(tutorialStep + 1)">Entendido</button>
        </div>
    </div>
    
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <script src="script.js"></script>
</body>
</html>
